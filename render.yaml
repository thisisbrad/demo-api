services:
  - type: web
    name: crud-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: MONGODB_URI
        sync: false # set the actual value in the Render dashboard
      - key: NODE_ENV
        value: production
